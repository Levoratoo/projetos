// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const lang = getLocale();
  const t = T[lang];

  document.documentElement.lang = lang === "pt" ? "pt-BR" : lang === "zh" ? "zh-CN" : lang;
  document.getElementById("printBtn").textContent = t.printBtn;
  document.getElementById("hSubtitle").textContent = t.subtitle;
  document.getElementById("hSummary").textContent = t.hSummary;
  document.getElementById("summaryText").textContent = t.summary;
  document.getElementById("hExperience").textContent = t.hExperience;
  document.getElementById("hProjects").textContent = t.hProjects;
  document.getElementById("hCerts").textContent = t.hCerts;
  document.getElementById("hEducation").textContent = t.hEducation;

  // Experiences
  document.getElementById("experienceList").innerHTML = t.experiences.map(e => `
    <div class="exp-item">
      <div class="exp-role">${e.role}</div>
      <div class="exp-sub">
        <span class="exp-company">${e.company}</span>
        <span class="exp-period">${e.period}</span>
      </div>
      <p class="exp-desc">${e.desc}</p>
    </div>`).join("");

  // Projects
  document.getElementById("projectsList").innerHTML = PROJECTS.map(p => `
    <div class="proj-item">
      <div class="proj-header">
        <span class="proj-title">${p.title}</span>
        <span class="proj-meta">${p.year}</span>
      </div>
      <div class="proj-desc">${p.desc[lang]}</div>
      <div class="proj-tags">${p.tags}</div>
      ${p.link ? `<a class="proj-link" href="${p.link}" target="_blank">${p.link.replace(/^https?:\/\//,"")}</a>` : ""}
    </div>`).join("");

  // Certs
  document.getElementById("certsList").innerHTML = CERTS.map(c => `
    <div class="cert-item">
      <span class="cert-name">${c.name}</span>
      <span class="cert-meta">${c.issuer}${c.url ? ` · <a class="cert-link" href="${c.url}" target="_blank">${c.kind==="pdf"?t.pdfCert:t.verify}</a>` : ""}</span>
    </div>`).join("");

  // Education
  document.getElementById("educationList").innerHTML = t.education.map(e => `
    <div class="edu-item">
      <div class="edu-degree">${e.degree}</div>
      <div class="edu-school">${e.school}</div>
      <div class="edu-period">${e.period}</div>
    </div>`).join("");
}

render();
